# ===============================
# CONFIGURACION DE LA BASE DE DATOS (PostgreSQL / Supabase)
# ===============================
# IMPORTANTE:
# - No quemar credenciales en codigo.
# - Estas variables se configuran en Render (Environment).
# Formato de URL para Supabase (agregar prefijo jdbc:):
# jdbc:postgresql://<db-host>.supabase.co:5432/postgres?sslmode=require
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# CONFIGURACIÓN DE JPA / HIBERNATE
# ===============================
# Para Ofertas de Marzo: al agregar nuevas columnas al modelo, permitimos
# que JPA cree/ajuste el esquema. Después de desplegar, puedes volver a validate si lo deseas.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# CONFIGURACION DEL SERVIDOR
# ===============================
# Render asigna un puerto dinamico.
# Si no existe PORT (local), usa 8080 por defecto.
server.port=${PORT:8080}

# ===============================
# CORS (Frontend)
# ===============================
# Origenes separados por coma. Produccion + desarrollo local.
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:https://matador-house.vercel.app,http://localhost:3000}

# ===============================
# EXTRAS (Opcional pero recomendado)
# ===============================
# Para que los JSON que envía el backend se vean ordenados
spring.jackson.serialization.indent_output=true