# ===============================
# CONFIGURACIÓN DE LA BASE DE DATOS (PostgreSQL)
# ===============================
# Railway nos dará estas variables automáticamente
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# CONFIGURACIÓN DE JPA / HIBERNATE
# ===============================
# 'update' sincroniza tus entidades de Java con las tablas de la base de datos
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# CONFIGURACIÓN DEL SERVIDOR
# ===============================
# Railway asigna un puerto dinámico, por eso usamos ${PORT}
# Si no hay una variable PORT, usará el 8080 por defecto
server.port=${PORT:8080}

# ===============================
# EXTRAS (Opcional pero recomendado)
# ===============================
# Para que los JSON que envía el backend se vean ordenados
spring.jackson.serialization.indent_output=true