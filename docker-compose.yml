version: '3.8'
services:
  db:
    image: postgres:16-alpine
    container_name: matador_postgres
    environment:
      POSTGRES_USER: matador_admin
      POSTGRES_PASSWORD: matador_password
      POSTGRES_DB: matador_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: